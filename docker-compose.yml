services:
  postgres:
    image: postgres:16-alpine
    container_name: easycrm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-easycrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-easycrm_password}
      POSTGRES_DB: ${POSTGRES_DB:-easycrm_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - easycrm_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-easycrm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easycrm_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-easycrm}:${POSTGRES_PASSWORD:-easycrm_password}@postgres:5432/${POSTGRES_DB:-easycrm_db}
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_in_production}
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "4000:4000"
    networks:
      - easycrm_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: easycrm_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    networks:
      - easycrm_network

volumes:
  postgres_data:

networks:
  easycrm_network:
    driver: bridge
